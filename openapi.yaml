        - type: object
          properties:
            data:
              type: object
              properties:
                currentJobInsId:
                  type: string
                tableCode:
                  type: string
                history:
                  type: array
                  items:
                    $ref: '#/components/schemas/DataQualityResult'

    DataQualityDiffResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DataQualityDiff'

