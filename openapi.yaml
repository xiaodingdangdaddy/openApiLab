openapi: 3.1.0
info:
  title: 元数据管理查询接口
  description: |
    统一封装逻辑模型、物理模型、血缘关系、TMF SID 数据目录、数据质量核查结果的查询 API。
    基于已有接口标准化后的 OpenAPI 3.1 规范，提供分页查询、详情查询、血缘查询、能力。
    
    本接口采用 Pull 模式设计，供 Datahub 等元数据管理平台主动调用拉取元数据。
  version: 2.0.0
  contact:
    name: 架构团队
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

servers:
  - url: https://api.example.com/api/v1
    description: 正式环境
  - url: https://api-test.example.com/api/v1
    description: 测试环境

tags:
  - name: logical-models
    description: 逻辑模型管理
  - name: data-quality
    description: 数据质量核查结果
  - name: tmf-sid-catalogs
    description: TMF SID 数据目录查询

# ============================================================
paths:

  # ============================================================
  # 逻辑模型
  # ============================================================
  /logical-models:
    get:
      tags:
        - logical-models
      operationId: queryLogicalModels
      summary: 查询逻辑模型列表
      description: 分页查询逻辑模型基本信息列表，支持按状态、单据类型筛选。
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: 租户ID，必选
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, release]
          description: 发布状态筛选
        - name: billType
          in: query
          schema:
            type: string
          description: 单据类型筛选
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 1
            minimum: 1
          description: 页码，从1开始
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 500
          description: 每页条数，最大500
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalModelListResponse'

  /logical-models/{tableName}:
    get:
      tags:
        - logical-models
      operationId: queryLogicalModelByName
      summary: 查询单个逻辑模型详情
      description: 通过逻辑模型表名查询包含物理模型映射、列定义、关联关系等完整详情。
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
          description: 逻辑模型表名
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: 租户ID，必选
        - name: isDefault
          in: query
          schema:
            type: string
            enum: ["1", "0"]
            default: "0"
          description: 是否记录访问次数，1-不记录，0-记录
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalModelResponse'
        '404':
          description: 逻辑模型不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logical-models/{tableName}/lineage:
    get:
      tags:
        - logical-models
      operationId: queryLogicalModelLineage
      summary: 查询逻辑模型血缘关系
      description: |
        查询指定逻辑模型的前向血缘和后向影响链路。
        返回递归嵌套结构，包含完整的上下游依赖关系。
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
          description: 逻辑模型表名
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
          description: 租户ID，必选
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalLineageResponse'
        '404':
          description: 逻辑模型不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ===== 版本历史 =====
  /logical-models/{tableName}/versions:
    get:
      tags:
        - logical-models
      operationId: queryLogicalModelVersions
      summary: 查询逻辑模型版本历史
      description: |
        查询逻辑模型的版本快照历史列表，按版本号倒序。
        仅记录触发版本变更的事件（发布、列结构变化、映射关系变化），描述性变更不生成版本。
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
          description: 逻辑模型表名
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalModelVersionListResponse'

  /logical-models/{tableName}/versions/{version}:
    get:
      tags:
        - logical-models
      operationId: queryLogicalModelVersionDetail
      summary: 查询逻辑模型指定版本详情
      description: 查询逻辑模型指定版本的完整快照内容。
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: version
          in: path
          required: true
          schema:
            type: integer
          description: 版本号
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalModelVersionDetailResponse'
        '404':
          description: 版本不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /logical-models/{tableName}/versions/diff:
    get:
      tags:
        - logical-models
      operationId: diffLogicalModelVersions
      summary: 比对逻辑模型两个版本的差异
      description: |
        比较逻辑模型两个版本之间的差异，返回变更字段列表和汇总统计。
        变更类型：ADDED（新增）、MODIFIED（修改）、DELETED（删除）
      parameters:
        - name: tableName
          in: path
          required: true
          schema:
            type: string
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: from
          in: query
          required: true
          schema:
            type: integer
          description: 比较起始版本号
        - name: to
          in: query
          required: true
          schema:
            type: integer
          description: 比较目标版本号
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LogicalModelDiffResponse'
        '400':
          description: 参数错误（from >= to 或版本不存在）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # 数据质量核查结果
  # ============================================================
  /data-quality/results:
    get:
      tags:
        - data-quality
      operationId: queryDataQualityResults
      summary: 查询数据质量核查结果列表
      description: 分页查询数据质量核查结果列表，支持按目录、模型、时间范围筛选。
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: catalogId
          in: query
          schema:
            type: string
          description: 目录ID筛选
        - name: tableCode
          in: query
          schema:
            type: string
          description: 模型编码筛选
        - name: startDataTime
          in: query
          schema:
            type: string
            format: date
          description: 数据开始日期（YYYY-MM-DD）
        - name: endDataTime
          in: query
          schema:
            type: string
            format: date
          description: 数据结束日期（YYYY-MM-DD）
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
            maximum: 500
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataQualityResultListResponse'

  /data-quality/results/{jobInsId}:
    get:
      tags:
        - data-quality
      operationId: queryDataQualityResultDetail
      summary: 查询数据质量核查结果详情
      description: |
        根据任务实例ID查询完整核查结果，包含表级、单表、字段级、SQL级等多维度结果。
        每次 DQ 任务运行生成唯一的 jobInsId，即为一个核查结果快照。
      parameters:
        - name: jobInsId
          in: path
          required: true
          schema:
            type: string
          description: 稽核任务实例ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataQualityResultDetailResponse'
        '404':
          description: 核查结果不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /data-quality/results/{jobInsId}/history:
    get:
      tags:
        - data-quality
      operationId: queryDataQualityResultHistory
      summary: 查询同一模型的历史核查结果
      description: |
        查询同一 tableCode 的历史核查结果列表，按时间倒序。
        用于对比某模型的质量趋势变化。
      parameters:
        - name: jobInsId
          in: path
          required: true
          schema:
            type: string
          description: 当前核查结果ID
        - name: tenantId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 50
          description: 返回最近 N 条历史结果（不含当前）
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataQualityHistoryListResponse'

  /data-quality/results/{jobInsId}/diff:
    get:
      tags:
        - data-quality
      operationId: diffDataQualityResults
      summary: 比对两次核查结果的差异
      description: |
        比较当前核查结果与历史某次核查结果的差异。
        返回分数变化、规则通过状态变化、错误记录数变化等。
      parameters:
        - name: jobInsId
          in: path
          required: true
          schema:
            type: string
          description: 当前核查结果ID
        - name: compareWith
          in: query
          required: true
          schema:
            type: string
          description: 对比核查结果ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataQualityDiffResponse'
        '404':
          description: 核查结果不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # TMF SID 数据目录
  # ============================================================
  /tmf-sid-catalogs:
    get:
      tags:
        - tmf-sid-catalogs
      operationId: queryTmfSidCatalogTree
      summary: 查询 TMF SID 目录树
      description: |
        查询 TMF SID 目录树，包含 Domain / ABE / BE / 业务对象 等各级目录。
        返回递归嵌套结构，表达父子层级关系。
        
        dataTypeId 枚举值：
        - 1：Domain
        - 2：ABE（Account Bilateral Entity）
        - 3：BE（Business Entity）
        - 4：业务对象
        - 10：逻辑模型
      parameters:
        - name: familyCatalogTypeId
          in: query
          required: true
          schema:
            type: string
          description: 目录族类型ID
        - name: dataTypeId
          in: query
          required: true
          schema:
            type: string
            enum: ["1", "2", "3", "4", "10"]
          description: |
            资产类型ID：
            1 - Domain
            2 - ABE
            3 - BE
            4 - 业务对象
            10 - 逻辑模型
        - name: themeId
          in: query
          schema:
            type: string
          description: 场景ID（可选）
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TmfSidCatalogTreeResponse'
        '400':
          description: 参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tmf-sid-catalogs/{catalogId}/models:
    get:
      tags:
        - tmf-sid-catalogs
      operationId: queryModelsUnderTmfSidCatalog
      summary: 查询指定 TMF SID 目录下的逻辑模型列表
      description: |
        在指定目录下查询关联的逻辑模型列表，支持分页和关键词搜索。
        搜索词匹配时会返回高亮字段信息。
      parameters:
        - name: catalogId
          in: path
          required: true
          schema:
            type: string
          description: 目录ID
        - name: familyCatalogId
          in: query
          required: true
          schema:
            type: string
          description: 目录族ID
        - name: themeId
          in: query
          required: true
          schema:
            type: string
          description: 场景ID
        - name: searchWord
          in: query
          schema:
            type: string
          description: 搜索词，支持高亮显示
        - name: onlyShowCurrent
          in: query
          schema:
            type: boolean
            default: false
          description: 是否仅显示当前目录下编目模型
        - name: pageNum
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 15
            maximum: 100
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TmfSidModelListResponse'
        '404':
          description: 目录不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

# ============================================================
components:
  schemas:

    # ===== 通用 =====
    ApiResponse:
      type: object
      properties:
        code:
          type: string
          example: success
        msg:
          type: string

    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: fail
        msg:
          type: string

    PaginationInfo:
      type: object
      properties:
        pageNum:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        pages:
          type: integer

    PaginationList:
      type: object
      properties:
        list:
          type: array
          items:
            type: object
        pageNum:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        pages:
          type: integer
        size:
          type: integer

    # ===== 逻辑模型 =====

    LogicalModel:
      type: object
      properties:
        tableName:
          type: string
        labelCh:
          type: string
        labelEn:
          type: string
        descCh:
          type: string
        descEn:
          type: string
        billType:
          type: string
          enum:
            - buziType_global
            - buziType_xdr
            - buziType_sdr
            - buziType_pre
            - buziType_bkpi
            - buziType_dim
            - buziType_cfg
            - buziType_json
            - buziType_event
            - buziType_dcae_event
        tenantId:
          type: string
        appName:
          type: string
        status:
          type: string
          enum: [draft, release]
        openFlag:
          type: integer
        subscribedFlag:
          type: integer
        relatedCatalogs:
          type: array
          items:
            $ref: '#/components/schemas/RelatedCatalog'
        relatedSubjectAreas:
          type: array
          items:
            $ref: '#/components/schemas/RelatedSubjectArea'
        relatedCube:
          type: array
          items:
            $ref: '#/components/schemas/RelatedCube'
        relatedPhysicalModels:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalModel'
        logicalColumns:
          type: array
          items:
            $ref: '#/components/schemas/LogicalColumn'
        logicTableRels:
          type: array
          items:
            $ref: '#/components/schemas/LogicLogicRel'
        indicatorsUsed:
          type: array
          items:
            $ref: '#/components/schemas/IndicatorsUsed'
        measureUsed:
          type: array
          items:
            $ref: '#/components/schemas/MeasureUsed'

    LogicalColumn:
      type: object
      properties:
        tableName:
          type: string
        columnName:
          type: string
        labelCh:
          type: string
        labelEn:
          type: string
        descCh:
          type: string
        descEn:
          type: string
        columnType:
          type: integer
        seqNo:
          type: integer
        openFlag:
          type: integer
        subscribedFlag:
          type: integer
        defaultValue:
          type: string
        sensitiveType:
          type: string
        dataStandardName:
          type: string
        relatedPhyColumnMapping:
          type: array
          items:
            $ref: '#/components/schemas/PhyColumnMapping'

    PhyColumnMapping:
      type: object
      properties:
        physicalModelName:
          type: string
        moduleId:
          type: integer
        datasourceId:
          type: string
        moduleName:
          type: string
        dataSourceType:
          type: string
        mapPhyColumnExpression:
          type: string

    RelatedCatalog:
      type: object
      properties:
        catalogId:
          type: string
        catalogName:
          type: string
        catalogNameEn:
          type: string
        dataStandardName:
          type: array
          items:
            type: string

    RelatedSubjectArea:
      type: object
      properties:
        subjectAreaId:
          type: integer
          format: int64
        subjectAreaName:
          type: string
        subjectAreaLabelCh:
          type: string
        subjectAreaLabelEn:
          type: string

    RelatedCube:
      type: object
      properties:
        cubeId:
          type: string
        cubeName:
          type: string
        labelCh:
          type: string
        labelEn:
          type: string
        descCh:
          type: string
        descEn:
          type: string
        cubeType:
          type: string
          enum: [entity_cubeType, virtual_cubeType, cuboid_cubetype]
        appName:
          type: string
        tenantId:
          type: string

    PhysicalModel:
      type: object
      properties:
        physicalModelName:
          type: string
        moduleId:
          type: integer
          format: int64
        labelCh:
          type: string
        labelEn:
          type: string
        descCh:
          type: string
        descEn:
          type: string
        billType:
          type: string
        taskCycle:
          type: integer
        ageValue:
          type: integer
        ageType:
          type: integer
        ageUnit:
          type: string
        intervalValue:
          type: integer
        dataDirectory:
          type: string
        validStartTime:
          type: string
        validEndTime:
          type: string
        tenantId:
          type: string
        appName:
          type: string
        relatedCatalogs:
          type: array
          items:
            $ref: '#/components/schemas/RelatedCatalog'
        relatedSubjectAreas:
          type: array
          items:
            $ref: '#/components/schemas/RelatedSubjectArea'
        physicalColumns:
          type: array
          items:
            $ref: '#/components/schemas/PhysicalColumn'

    PhysicalColumn:
      type: object
      properties:
        columnName:
          type: string
        labelEn:
          type: string
        labelCh:
          type: string
        dataType:
          type: string
        dataLength:
          type: string
        dataPrecision:
          type: integer
        columnType:
          type: integer
          format: int64
        seqNo:
          type: integer
          format: int64
        descEn:
          type: string
        descCh:
          type: string
        columnFamily:
          type: string
        columnFamilyType:
          type: integer
        indexType:
          type: string
          enum: [BTree, UPI, PI, SI]
        subscribedFlag:
          type: integer
        sensitiveType:
          type: string
        openFlag:
          type: integer
          format: int64

    LogicLogicRel:
      type: object
      properties:
        sourceTableName:
          type: string
        targetTableName:
          type: string
        relationType:
          type: string
        mappingExpression:
          type: string

    IndicatorsUsed:
      type: object
      properties:
        tableName:
          type: string
        indicatorId:
          type: string
        indicatorName:
          type: string
        labelCh:
          type: string
        labelEn:
          type: string
        mapExpression:
          type: string
        tenantId:
          type: string
        openFlag:
          type: integer
        deletedFlag:
          type: integer
        subscribedFlag:
          type: integer

    MeasureUsed:
      type: object
      properties:
        tableName:
          type: string
        measureName:
          type: string
        labelCh:
          type: string
        labelEn:
          type: string
        tenantId:
          type: string
        openFlag:
          type: integer
        deletedFlag:
          type: integer
        subscribedFlag:
          type: integer

    LogicalLineage:
      type: object
      properties:
        appName:
          type: string
        billType:
          type: string
        catalogId:
          type: array
          items:
            type: string
        lastModifyTime:
          type: string
        logicalModelLabelCh:
          type: string
        logicalModelLabelEn:
          type: string
        logicalModelName:
          type: string
        forwardLineage:
          type: array
          items:
            $ref: '#/components/schemas/LogicalLineage'
        backwardImpact:
          type: array
          items:
            $ref: '#/components/schemas/LogicalLineage'

    # ===== 逻辑模型版本历史 =====

    LogicalModelVersion:
      type: object
      description: 逻辑模型版本快照摘要
      properties:
        version:
          type: integer
          description: 版本号（自增）
        changeType:
          type: string
          description: 版本变更类型
          enum: [CREATE, RELEASE, COLUMN_ADDED, COLUMN_MODIFIED, COLUMN_DELETED,
                 PHYSICAL_MODEL_ADDED, PHYSICAL_MODEL_DELETED, PHYSICAL_MODEL_CHANGED,
                 OPEN_FLAG_CHANGED]
        changeSummary:
          type: string
          description: 变更摘要描述
        releasedAt:
          type: string
          format: date-time
          description: 版本发布时间
        releasedBy:
          type: string
          description: 发布人
        status:
          type: string
          enum: [draft, release]

    LogicalModelVersionDetail:
      allOf:
        - $ref: '#/components/schemas/LogicalModelVersion'
        - type: object
          properties:
            snapshot:
              $ref: '#/components/schemas/LogicalModel'
              description: 完整的模型快照

    LogicalModelDiffItem:
      type: object
      description: 单个字段变更详情
      properties:
        path:
          type: string
          description: 变更字段路径，如 logicalColumns[0].columnName
        changeType:
          type: string
          enum: [ADDED, MODIFIED, DELETED]
        from:
          type: object
          description: 变更前的值
        to:
          type: object
          description: 变更后的值

    LogicalModelDiff:
      type: object
      description: 版本差异比对结果
      properties:
        tableName:
          type: string
        fromVersion:
          type: integer
        toVersion:
          type: integer
        changedFields:
          type: array
          items:
            $ref: '#/components/schemas/LogicalModelDiffItem'
        summary:
          type: object
          properties:
            columnsAdded:
              type: integer
            columnsModified:
              type: integer
            columnsDeleted:
              type: integer
            physicalModelsAdded:
              type: integer
            physicalModelsDeleted:
              type: integer

    # ===== 响应结构（逻辑模型）=====

    LogicalModelListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items:
                    $ref: '#/components/schemas/LogicalModel'
                pagination:
                  $ref: '#/components/schemas/PaginationInfo'

    LogicalModelResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LogicalModel'

    LogicalLineageResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LogicalLineage'

    LogicalModelVersionListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                tableName:
                  type: string
                list:
                  type: array
                  items:
                    $ref: '#/components/schemas/LogicalModelVersion'
                pagination:
                  $ref: '#/components/schemas/PaginationInfo'

    LogicalModelVersionDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LogicalModelVersionDetail'

    LogicalModelDiffResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/LogicalModelDiff'

    # ===== 数据质量核查结果 =====

    DataQualityResult:
      type: object
      description: 数据质量核查结果
      properties:
        jobInsId:
          type: string
          description: 稽核任务实例ID（每次核查运行生成唯一ID，即一个结果快照）
        tableInsId:
          type: string
        jobInsCode:
          type: string
        jobInsName:
          type: string
        taskId:
          type: string
        taskCode:
          type: string
        catalogId:
          type: string
        catalogName:
          type: string
        catalogCode:
          type: string
        catalogPath:
          type: string
        dsType:
          type: integer
        taskName:
          type: string
        tableCode:
          type: string
        tableName:
          type: string
        colName:
          type: string
        createOperator:
          type: string
        description:
          type: string
        startDataTime:
          type: string
        endDataTime:
          type: string
        sumLineNum:
          type: integer
        startTime:
          type: integer
          format: int64
          description: 开始时间（Unix毫秒）
        endTime:
          type: integer
          format: int64
          description: 结束时间（Unix毫秒）
        status:
          type: integer
        score:
          type: number
          format: double
          description: 质量评分
        scheduler:
          type: string
        taskTableId:
          type: string
        taskColId:
          type: string
        modelId:
          type: string

    DataQualityResultDetail:
      allOf:
        - $ref: '#/components/schemas/DataQualityResult'
        - type: object
          properties:
            jsonData:
              type: object
            jobInstanceDetailTableList:
              type: array
              items:
                $ref: '#/components/schemas/JobInstanceResultDetailBo'
            jobInstanceDetailSingTableList:
              type: array
              items:
                $ref: '#/components/schemas/JobInstanceResultDetailBo'
            jobInstanceDetailFieldList:
              type: array
              items:
                $ref: '#/components/schemas/JobInstanceResultDetailBo'
            jobInstanceDetailSqlList:
              type: array
              items:
                $ref: '#/components/schemas/JobInstanceResultDetailBo'
            jobInsResultDetailFieldBo:
              $ref: '#/components/schemas/JobInsResultDetailField'

    JobInstanceResultDetailBo:
      type: object
      properties:
        ruleCode:
          type: string
        threshold:
          type: integer
        totalRecord:
          type: integer
        badRecord:
          type: integer
        isCheckPass:
          type: integer
          description: 0-未通过，1-通过
        flagSite:
          type: string
        fields:
          type: string
        needErrorData:
          type: boolean
        aidedTableCode:
          type: string
        aidedTableCol:
          type: string
        dependentRelation:
          type: string

    JobInsResultDetailField:
      type: object
      properties:
        ruleCode:
          type: string
        threshold:
          type: integer
        totalRecord:
          type: integer
        badRecord:
          type: integer
        isCheckPass:
          type: integer
        fields:
          type: string

    RuleDelta:
      type: object
      description: 单个规则的比对结果
      properties:
        ruleCode:
          type: string
        ruleName:
          type: string
        fromBadRecord:
          type: integer
        toBadRecord:
          type: integer
        fromIsPass:
          type: integer
        toIsPass:
          type: integer
        delta:
          type: string
          description: 变化类型：IMPROVED（改善）、DEGRADED（恶化）、UNCHANGED（不变）
          enum: [IMPROVED, DEGRADED, UNCHANGED]

    DataQualityDiff:
      type: object
      description: 核查结果比对结果
      properties:
        fromJobInsId:
          type: string
        toJobInsId:
          type: string
        fromScore:
          type: number
          format: double
        toScore:
          type: number
          format: double
        scoreDelta:
          type: number
          format: double
          description: 分数变化值（正数为提升，负数为下降）
        ruleDeltas:
          type: array
          items:
            $ref: '#/components/schemas/RuleDelta'
        newFailedRules:
          type: array
          items:
            type: string
          description: 新增的失败规则编码
        recoveredRules:
          type: array
          items:
            type: string
          description: 恢复通过的规则编码

    # ===== 响应结构（数据质量）=====

    DataQualityResultListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                list:
                  type: array
                  items:
                    $ref: '#/components/schemas/DataQualityResult'
                pagination:
                  $ref: '#/components/schemas/PaginationInfo'

    DataQualityResultDetailResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DataQualityResultDetail'

    DataQualityHistoryListResponse:
      allOf:
